name: Auto-Fix Issues

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to auto-fix"
        required: true
        type: number

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: github.event_name == 'workflow_dispatch' || (github.event.label.name == 'auto-fix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine Issue Number
        id: issue
        run: |
          NUM="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          echo "number=$NUM" >> $GITHUB_OUTPUT

      - name: Fetch Issue Details
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue view ${{ steps.issue.outputs.number }} --json title,body,labels > /tmp/issue.json
          echo "title=$(python -c \"import json; print(json.load(open('/tmp/issue.json'))['title'])\")" >> $GITHUB_OUTPUT

      - name: Mark Fix In Progress
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit ${{ steps.issue.outputs.number }} --add-label "fix-in-progress" --remove-label "auto-fix" 2>/dev/null || true
          gh issue comment ${{ steps.issue.outputs.number }} --body "Auto-fix workflow has started working on this issue. A PR will be opened shortly."

      - name: Search and Apply Fix
        id: fix
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
        run: |
          python scripts/auto_fix.py /tmp/issue.json > /tmp/fix_result.json 2>&1 || true
          cat /tmp/fix_result.json
          echo "branch=$(python -c \"import json; r=json.load(open('/tmp/fix_result.json')); print(r.get('branch', 'fix/issue-' + str($ISSUE_NUM)))\")" >> $GITHUB_OUTPUT
          echo "status=$(python -c \"import json; print(json.load(open('/tmp/fix_result.json')).get('status', 'no-fix'))\")" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.fix.outputs.status == 'fixed'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          BRANCH: ${{ steps.fix.outputs.branch }}
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Auto-fix: Address issue #$ISSUE_NUM"
          git push origin $BRANCH
          gh pr create \
            --base master \
            --head $BRANCH \
            --title "Auto-fix: $(python -c \"import json; print(json.load(open('/tmp/issue.json'))['title'])\")" \
            --body "## Description

            Closes #$ISSUE_NUM

            This PR was automatically generated by the auto-fix workflow.

            ### Summary
            $(python -c "import json; r=json.load(open('/tmp/fix_result.json')); print(r.get('summary', 'See issue for details'))")

            ### Checklist
            - [ ] The change follows existing code patterns
            - [ ] Variables and functions are named clearly
            - [ ] The tool still launches and attaches correctly
            - [ ] ESP/Aimbot/Radar features still work

            ### Approval
            This PR requires at least one reviewer approval before it can be merged.
            " \
            --reviewer ${{ github.repository_owner }} 2>/dev/null || true

      - name: Update Issue - No Fix Found
        if: steps.fix.outputs.status == 'no-fix'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ steps.issue.outputs.number }} --body "Auto-fix analysis complete but no automated fix could be applied.

          **Reason:** $(python -c "import json; r=json.load(open('/tmp/fix_result.json')); print(r.get('reason', 'Unknown'))")

          A human maintainer will need to investigate this issue manually."
          gh issue edit ${{ steps.issue.outputs.number }} --remove-label "fix-in-progress" 2>/dev/null || true

      - name: Update Issue - Fix Ready
        if: steps.fix.outputs.status == 'fixed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit ${{ steps.issue.outputs.number }} --add-label "fix-ready" --remove-label "fix-in-progress" 2>/dev/null || true
